<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  #status {
    font-size: 1.2rem;
    margin-bottom: 1.5rem;
    height: 1.5em;
    color: #a0a0c0;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: 320px;
    height: 320px;
  }

  .cell {
    background: #1a1a2e;
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    font-size: 3rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .cell:hover:not(.taken) {
    background: #22223a;
    transform: scale(1.04);
  }

  .cell.x { color: #6ee7b7; }
  .cell.o { color: #f472b6; }

  .cell.win {
    background: #2a2a4a;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  #restart {
    margin-top: 1.5rem;
    padding: 0.6rem 2rem;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s;
  }

  #restart:hover { background: #818cf8; }

  .scoreboard {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.5rem;
    font-size: 1.1rem;
  }

  .scoreboard span { font-weight: 700; }
  .scoreboard .x-score { color: #6ee7b7; }
  .scoreboard .o-score { color: #f472b6; }
</style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="scoreboard">
    <div>X: <span class="x-score" id="xScore">0</span></div>
    <div>Draws: <span id="draws">0</span></div>
    <div>O: <span class="o-score" id="oScore">0</span></div>
  </div>
  <div id="status">X's turn</div>
  <div class="board" id="board"></div>
  <button id="restart">New Game</button>

<script>
  const board = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const restartBtn = document.getElementById('restart');
  const xScoreEl = document.getElementById('xScore');
  const oScoreEl = document.getElementById('oScore');
  const drawsEl = document.getElementById('draws');

  let cells, turn, gameOver, scores = { X: 0, O: 0, D: 0 };

  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function init() {
    board.innerHTML = '';
    cells = Array(9).fill('');
    turn = 'X';
    gameOver = false;
    statusEl.textContent = "X's turn";

    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.addEventListener('click', handleClick);
      board.appendChild(cell);
    }
  }

  function handleClick(e) {
    if (gameOver) return;
    const i = e.target.dataset.index;
    if (cells[i]) return;

    cells[i] = turn;
    const cell = e.target;
    cell.textContent = turn;
    cell.classList.add(turn.toLowerCase(), 'taken');

    const winCombo = checkWin(turn);
    if (winCombo) {
      gameOver = true;
      statusEl.textContent = `${turn} wins!`;
      scores[turn]++;
      updateScores();
      winCombo.forEach(idx => board.children[idx].classList.add('win'));
      return;
    }

    if (cells.every(c => c)) {
      gameOver = true;
      statusEl.textContent = "It's a draw!";
      scores.D++;
      updateScores();
      return;
    }

    turn = turn === 'X' ? 'O' : 'X';
    statusEl.textContent = `${turn}'s turn`;
  }

  function checkWin(player) {
    return wins.find(combo => combo.every(i => cells[i] === player)) || null;
  }

  function updateScores() {
    xScoreEl.textContent = scores.X;
    oScoreEl.textContent = scores.O;
    drawsEl.textContent = scores.D;
  }

  restartBtn.addEventListener('click', init);
  init();
</script>
</body>
</html>
